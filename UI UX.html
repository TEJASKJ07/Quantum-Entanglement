<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qmessaging | Quantum Secure Network</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 15px rgba(139, 92, 246, 0);
            }

            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
            }
        }

        .animate-pulse-ring {
            animation: pulse-ring 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen text-gray-100 font-sans selection:bg-purple-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const LockIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const UserIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const SendIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const LinkIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;

        // --- QUANTUM UTILS (Preserved from original) ---
        const generateQuantumKey = (length) => Array.from({ length }, () => Math.random() < 0.5 ? '0' : '1').join('');
        const xorEncrypt = (message, key) => {
            let encrypted = '';
            for (let i = 0; i < message.length; i++) {
                const charCode = message.charCodeAt(i);
                const keyBit = parseInt(key[i % key.length]);
                encrypted += String.fromCharCode(charCode ^ (keyBit * 127));
            }
            return btoa(encrypted);
        };
        const xorDecrypt = (encrypted, key) => {
            try {
                const decoded = atob(encrypted);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const charCode = decoded.charCodeAt(i);
                    const keyBit = parseInt(key[i % key.length]);
                    decrypted += String.fromCharCode(charCode ^ (keyBit * 127));
                }
                return decrypted;
            } catch { return '[DECRYPTION FAILED]'; }
        };

        const QMessagingApp = () => {
            // App Routing State
            const [view, setView] = useState('login'); // 'login', 'dashboard', 'connecting', 'chat'

            // User Data
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [targetUser, setTargetUser] = useState('');

            // Quantum State
            const [sharedKey, setSharedKey] = useState('');
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const [networkLog, setNetworkLog] = useState([]);
            const chatEndRef = useRef(null);

            const addLog = (msg, type = 'info') => {
                setNetworkLog(prev => [...prev, { msg, type, time: new Date().toLocaleTimeString() }]);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (username.trim() && password.trim()) {
                    setView('dashboard');
                }
            };

            const establishConnection = async (e) => {
                e.preventDefault();
                if (!targetUser.trim()) return;

                setView('connecting');
                setNetworkLog([]);

                // Entanglement Swapping Simulation
                addLog('🔵 Initializing quantum network...', 'info');
                await new Promise(r => setTimeout(r, 1000));

                addLog(`⚛️ Generating entangled pairs at Quantum Router`, 'success');
                await new Promise(r => setTimeout(r, 1200));

                addLog(`📡 Distributing photons to ${username} and ${targetUser}`, 'info');
                await new Promise(r => setTimeout(r, 1200));

                addLog(`🔬 Router performing Bell state measurement`, 'info');
                await new Promise(r => setTimeout(r, 1200));

                addLog(`✨ Entanglement swapped! ${username} ↔ ${targetUser} are now entangled`, 'success');
                await new Promise(r => setTimeout(r, 1000));

                const qKey = generateQuantumKey(256);
                setSharedKey(qKey);

                addLog(`🔐 Quantum key successfully generated`, 'success');
                await new Promise(r => setTimeout(r, 800));

                setView('chat');
            };

            const sendMessage = (e) => {
                e.preventDefault();
                if (!newMessage.trim()) return;

                const encrypted = xorEncrypt(newMessage, sharedKey);
                const msgObj = {
                    id: Date.now(),
                    sender: username,
                    text: newMessage,
                    encrypted: encrypted,
                    isMine: true,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                setMessages(prev => [...prev, msgObj]);
                setNewMessage('');

                // Auto-scroll
                setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);

                // Simulate reply for demo purposes
                setTimeout(() => {
                    const replyText = "Message received securely!";
                    const replyEncrypted = xorEncrypt(replyText, sharedKey);
                    setMessages(prev => [...prev, {
                        id: Date.now() + 1,
                        sender: targetUser,
                        text: replyText,
                        encrypted: replyEncrypted,
                        isMine: false,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }]);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                }, 2000);
            };

            const logout = () => {
                setUsername('');
                setPassword('');
                setTargetUser('');
                setSharedKey('');
                setMessages([]);
                setView('login');
            };

            // --- UI COMPONENTS ---

            if (view === 'login') {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-[url('https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center">
                        <div className="absolute inset-0 bg-gray-900/80 backdrop-blur-sm"></div>
                        <div className="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 text-gray-800">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent mb-2">Qmessaging</h1>
                                <p className="text-gray-500 font-medium">Quantum-Secured Communications</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Node Identifier (Username)</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <UserIcon />
                                        </div>
                                        <input type="text" required value={username} onChange={e => setUsername(e.target.value)}
                                            className="w-full pl-10 pr-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all" placeholder="e.g. Alice" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Access Passphrase</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <LockIcon />
                                        </div>
                                        <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                                            className="w-full pl-10 pr-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all" placeholder="••••••••" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold shadow-lg shadow-purple-500/30 hover:shadow-purple-500/50 transform transition hover:-translate-y-0.5">
                                    Authenticate Node
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'dashboard') {
                return (
                    <div className="min-h-screen bg-gray-50 p-6 flex flex-col items-center justify-center">
                        <div className="absolute top-6 right-6 flex items-center gap-4">
                            <span className="text-gray-600 font-medium">Logged in as <strong className="text-purple-600">{username}</strong></span>
                            <button onClick={logout} className="text-sm text-gray-500 hover:text-gray-800">Disconnect</button>
                        </div>

                        <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 w-full max-w-lg text-center">
                            <div className="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-600">
                                <LinkIcon />
                            </div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">Establish Connection</h2>
                            <p className="text-gray-500 mb-8">Enter the username of the party you wish to securely communicate with via quantum entanglement swapping.</p>

                            <form onSubmit={establishConnection} className="space-y-4 text-left">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Target Node</label>
                                    <input type="text" required value={targetUser} onChange={e => setTargetUser(e.target.value)}
                                        className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:bg-white outline-none transition-all text-gray-800" placeholder="e.g. Charlie" />
                                </div>
                                <button type="submit" className="w-full py-3 px-4 bg-gray-900 text-white rounded-xl font-bold shadow-lg hover:bg-black transition-colors flex items-center justify-center gap-2">
                                    Initiate Entanglement Swapping
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'connecting') {
                return (
                    <div className="min-h-screen bg-gray-900 text-white p-6 flex flex-col items-center justify-center">
                        <h2 className="text-2xl font-bold mb-12 text-center bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Quantum Handshake Protocol</h2>

                        {/* Visualizer */}
                        <div className="relative w-full max-w-2xl h-64 mb-12 flex items-center justify-between px-10">
                            {/* Lines */}
                            <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}>
                                <line x1="20%" y1="50%" x2="50%" y2="50%" stroke="#8b5cf6" strokeWidth="2" strokeDasharray="5,5" className="animate-pulse" />
                                <line x1="50%" y1="50%" x2="80%" y2="50%" stroke="#8b5cf6" strokeWidth="2" strokeDasharray="5,5" className="animate-pulse" />
                            </svg>

                            {/* Nodes */}
                            <div className="flex flex-col items-center z-10">
                                <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.5)]">
                                    <span className="font-bold">{username[0]?.toUpperCase()}</span>
                                </div>
                                <span className="mt-3 font-medium text-gray-300">{username}</span>
                            </div>

                            <div className="flex flex-col items-center z-10">
                                <div className="w-20 h-20 bg-purple-600 rounded-lg rotate-45 flex items-center justify-center animate-pulse-ring shadow-[0_0_40px_rgba(147,51,234,0.6)]">
                                    <div className="-rotate-45 font-bold text-sm text-center">Router<br />(Bob)</div>
                                </div>
                                <span className="mt-6 font-medium text-gray-400 text-sm">Entanglement Swapper</span>
                            </div>

                            <div className="flex flex-col items-center z-10">
                                <div className="w-16 h-16 bg-pink-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(219,39,119,0.5)]">
                                    <span className="font-bold">{targetUser[0]?.toUpperCase()}</span>
                                </div>
                                <span className="mt-3 font-medium text-gray-300">{targetUser}</span>
                            </div>
                        </div>

                        {/* Terminal Log */}
                        <div className="bg-black/50 border border-gray-800 rounded-xl p-6 w-full max-w-lg font-mono text-sm h-48 overflow-y-auto">
                            {networkLog.map((log, i) => (
                                <div key={i} className={`mb-2 ${log.type === 'success' ? 'text-green-400' : 'text-blue-400'}`}>
                                    <span className="opacity-50 text-xs">[{log.time}]</span> {log.msg}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'chat') {
                return (
                    <div className="min-h-screen bg-gray-100 flex justify-center py-4 sm:py-8 px-4 sm:px-0 text-gray-800">
                        <div className="w-full max-w-4xl bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-200">

                            {/* Header */}
                            <div className="bg-gray-900 text-white p-4 sm:p-6 flex items-center justify-between flex-shrink-0">
                                <div>
                                    <h2 className="text-xl font-bold flex items-center gap-2">
                                        <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                                        {targetUser}
                                    </h2>
                                    <p className="text-xs text-green-400 mt-1 flex items-center gap-1">
                                        <LockIcon /> Quantum Secured Channel
                                    </p>
                                </div>
                                <div className="text-right">
                                    <div className="text-xs text-gray-400 mb-1">Session Key Fragment:</div>
                                    <div className="font-mono bg-black/50 px-2 py-1 rounded text-purple-300 text-xs tracking-wider">
                                        {sharedKey.substring(0, 16)}...
                                    </div>
                                    <button onClick={() => setView('dashboard')} className="text-xs text-red-400 hover:text-red-300 mt-2 underline">End Session</button>
                                </div>
                            </div>

                            {/* Chat Area */}
                            <div className="flex-1 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] overflow-y-auto p-4 sm:p-6 space-y-6">
                                {messages.length === 0 ? (
                                    <div className="text-center text-gray-400 mt-10">
                                        <div className="bg-purple-50 text-purple-700 px-4 py-2 rounded-full inline-block text-sm font-medium mb-2 border border-purple-200">
                                            Entanglement verified. Safe to transmit.
                                        </div>
                                    </div>
                                ) : (
                                    messages.map((msg) => (
                                        <div key={msg.id} className={`flex ${msg.isMine ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[80%] ${msg.isMine ? 'bg-gradient-to-br from-indigo-600 to-purple-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-gray-200 text-gray-800 rounded-r-2xl rounded-tl-2xl'} p-4 shadow-md`}>
                                                <div className="font-medium mb-1 break-words">{msg.text}</div>

                                                {/* Inspect Encrypted Data */}
                                                <div className={`text-[10px] mt-2 pt-2 border-t ${msg.isMine ? 'border-indigo-400/50 text-indigo-200' : 'border-gray-300 text-gray-500'} font-mono overflow-hidden break-all`}>
                                                    <span className="font-bold opacity-75">Encrypted Transit:</span><br />
                                                    {msg.encrypted.length > 50 ? msg.encrypted.substring(0, 50) + '...' : msg.encrypted}
                                                </div>

                                                <div className={`text-[10px] mt-1 text-right opacity-70`}>{msg.time}</div>
                                            </div>
                                        </div>
                                    ))
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input Area */}
                            <div className="bg-white p-4 border-t border-gray-100 flex-shrink-0">
                                <form onSubmit={sendMessage} className="flex gap-2">
                                    <input
                                        type="text"
                                        value={newMessage}
                                        onChange={(e) => setNewMessage(e.target.value)}
                                        placeholder={`Secure message to ${targetUser}...`}
                                        className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-full focus:outline-none focus:border-purple-500 focus:bg-white transition-colors"
                                    />
                                    <button
                                        type="submit"
                                        disabled={!newMessage.trim()}
                                        className="w-12 h-12 bg-purple-600 text-white rounded-full flex items-center justify-center hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transform transition active:scale-95"
                                    >
                                        <SendIcon />
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QMessagingApp />);
    </script>
</body>

</html>
